<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OpenOutreach — Dashboard</title>
  <style>
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #f3f4f6; color: #111827; }
    header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e5e7eb; font-size: 20px; font-weight: 700; }
    .wrap { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
    .kpi { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 18px; }
    .kpi .label { font-size: 13px; color: #6b7280; }
    .kpi .value { font-size: 30px; font-weight: 700; margin-top: 6px; }
    h2 { margin-top: 32px; font-size: 16px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
    th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    th { background: #f9fafb; color: #6b7280; font-weight: 600; }
    select { padding: 8px; border-radius: 8px; border: 1px solid #d1d5db; }
    .tree { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 18px; }
    .node { border: 1px solid #d1d5db; border-radius: 8px; padding: 6px 12px; display: inline-block; margin: 4px 0; background: #fff; font-size: 13px; }
    .branch { margin-left: 28px; border-left: 2px solid #e5e7eb; padding-left: 16px; margin-top: 4px; }
    .blabel { font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .ok { color: #059669; } .no { color: #dc2626; }
    .bar { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
    .bar > div { height: 100%; background: #2563eb; }
  </style>
</head>
<body>
  <header>OpenOutreach — Dashboard</header>
  <div class="wrap">
    <div class="kpis" id="kpis"></div>

    <h2>Senders</h2>
    <table id="senders"><thead><tr><th>Account</th><th>Active</th><th>InMail</th><th>Connect (used/cap)</th><th>Message</th></tr></thead><tbody></tbody></table>

    <h2>Sequence flow <select id="seqpick"></select></h2>
    <div class="tree" id="flow">Pick a sequence…</div>
  </div>

  <script>
    const j = (u) => fetch(u).then(r => r.json());

    const KPI_LABELS = {
      connection_requests: "Connection Requests", messages_sent: "Messages Sent",
      inmails_sent: "InMails Sent", replies: "Replies", active: "Active", completed: "Completed",
    };
    j("api/kpis/").then(d => {
      document.getElementById("kpis").innerHTML = Object.entries(KPI_LABELS)
        .map(([k, label]) => `<div class="kpi"><div class="label">${label}</div><div class="value">${d[k] ?? 0}</div></div>`).join("");
    });

    j("api/senders/").then(d => {
      const cap = (u, k) => u[k] ? `${u[k].used}/${u[k].cap}` : "—";
      document.querySelector("#senders tbody").innerHTML = d.senders.map(s => `
        <tr><td>${s.username}</td>
        <td class="${s.active ? "ok" : "no"}">${s.active ? "yes" : "no"}</td>
        <td class="${s.has_inmail ? "ok" : "no"}">${s.has_inmail ? "yes" : "no"}</td>
        <td>${cap(s.usage, "connect")}</td><td>${cap(s.usage, "message")}</td></tr>`).join("")
        || `<tr><td colspan="5">No senders yet.</td></tr>`;
    });

    function renderNode(n) {
      if (!n) return "";
      const cfg = n.config && Object.keys(n.config).length ? ` <span style="color:#6b7280">(${JSON.stringify(n.config)})</span>` : "";
      let html = `<div><span class="node">${n.step_type}${cfg}</span></div>`;
      if (n.success.length) html += `<div class="branch"><div class="blabel ok">accepted / replied</div>${n.success.map(renderNode).join("")}</div>`;
      if (n.failure.length) html += `<div class="branch"><div class="blabel no">not-accepted / no-reply</div>${n.failure.map(renderNode).join("")}</div>`;
      return html;
    }

    j("api/sequences/").then(d => {
      const sel = document.getElementById("seqpick");
      sel.innerHTML = `<option value="">—</option>` + d.sequences.map(s => `<option value="${s.id}">${s.name}</option>`).join("");
      sel.onchange = () => {
        if (!sel.value) { document.getElementById("flow").textContent = "Pick a sequence…"; return; }
        j(`api/sequence/${sel.value}/`).then(seq => {
          document.getElementById("flow").innerHTML = seq.root ? renderNode(seq.root) : "Empty sequence.";
        });
      };
    });
  </script>
</body>
</html>
