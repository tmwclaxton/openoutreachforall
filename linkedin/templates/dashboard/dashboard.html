<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OpenOutreach</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #f3f4f6; color: #111827; }
    header { background: #111827; color: #fff; padding: 14px 24px; font-size: 18px; font-weight: 700; }
    nav { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 16px; display: flex; gap: 4px; }
    nav button { background: none; border: none; padding: 14px 16px; font-size: 14px; cursor: pointer; color: #6b7280; border-bottom: 2px solid transparent; }
    nav button.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }
    .wrap { padding: 24px; }
    .tab { display: none; } .tab.active { display: block; }
    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
    .kpi { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; }
    .kpi .label { font-size: 12px; color: #6b7280; } .kpi .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    h2 { font-size: 15px; margin-top: 24px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
    th, td { text-align: left; padding: 9px 14px; border-bottom: 1px solid #f1f5f9; font-size: 13px; } th { background: #f9fafb; color: #6b7280; }
    select, input { padding: 7px 8px; border-radius: 7px; border: 1px solid #d1d5db; font-size: 13px; }
    .tree { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 18px; margin-top: 12px; }
    .node { border: 1px solid #c7cdd6; border-radius: 8px; padding: 8px 12px; background: #fff; font-size: 13px; display: inline-block; }
    .node b { text-transform: capitalize; }
    .node .ed { color: #2563eb; cursor: pointer; margin-left: 8px; font-size: 12px; }
    .branch { margin-left: 22px; padding-left: 16px; margin-top: 6px; }
    .branch.yes { border-left: 3px solid #059669; } .branch.no { border-left: 3px solid #dc2626; }
    .blabel { font-size: 11px; font-weight: 700; margin: 8px 0 4px; }
    .yes .blabel { color: #059669; } .no .blabel { color: #dc2626; }
    .addbtn { font-size: 12px; border: 1px dashed #9ca3af; background: #f9fafb; color: #374151; border-radius: 7px; padding: 4px 10px; cursor: pointer; margin: 6px 8px 0 0; }
    .addbtn.yes { border-color: #059669; color: #059669; } .addbtn.no { border-color: #dc2626; color: #dc2626; }
    .editor { margin: 6px 0 4px; padding: 10px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; max-width: 560px; }
    .editor label { display: block; font-size: 11px; color: #6b7280; margin: 6px 0 2px; }
    .editor textarea, .editor input { width: 100%; }
    .editor button, .picker button { margin-top: 8px; background: #2563eb; color: #fff; border: none; padding: 7px 14px; border-radius: 6px; cursor: pointer; }
    .picker { margin: 6px 0; padding: 8px; background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 8px; display: inline-block; }
    .hint { font-size: 12px; color: #6b7280; }
    .bar { margin-bottom: 12px; display: flex; gap: 8px; align-items: center; }
    iframe { width: 100%; height: 78vh; border: 1px solid #e5e7eb; border-radius: 10px; background: #fff; }
  </style>
</head>
<body>
  <header>OpenOutreach — Grantgunner</header>
  <nav id="nav"></nav>
  <div class="wrap">
    <div class="tab active" id="tab-dashboard">
      <div class="kpis" id="kpis"></div>
      <h2>Senders</h2>
      <table id="senders"><thead><tr><th>Account</th><th>Active</th><th>InMail</th><th>Connect/day</th><th>Message/day</th></tr></thead><tbody></tbody></table>
    </div>

    <div class="tab" id="tab-flows">
      <div class="bar">
        <select id="seqpick"></select>
        <input id="newseqname" placeholder="New sequence name">
        <button class="addbtn" onclick="createSeq()">+ Create sequence</button>
      </div>
      <p class="hint">Build the flow: each step branches. Green = <b>if YES</b> (accepted / replied), red = <b>if NO</b> (not accepted / no reply). Click a step to edit its message — use <code>{first_name}</code>.</p>
      <div class="tree" id="flow">Pick or create a sequence…</div>
    </div>

    <div class="tab" id="tab-unibox"><iframe data-src="/admin/linkedin/messagethread/"></iframe></div>
    <div class="tab" id="tab-accounts"><iframe data-src="/admin/linkedin/linkedinprofile/"></iframe></div>
    <div class="tab" id="tab-leads"><iframe data-src="/admin/linkedin/leadlist/"></iframe></div>
    <div class="tab" id="tab-campaigns"><iframe data-src="/admin/linkedin/campaign/"></iframe></div>
  </div>

  <script>
    const j = (u, o) => fetch(u, o).then(r => r.json());
    const TABS = [["dashboard","Dashboard"],["flows","Flows"],["unibox","Unibox"],["accounts","Accounts"],["leads","Leads"],["campaigns","Campaigns"]];
    const nav = document.getElementById("nav");
    TABS.forEach(([id, label], i) => { const b = document.createElement("button"); b.textContent = label; b.className = i===0?"active":""; b.onclick = () => showTab(id, b); nav.appendChild(b); });
    function showTab(id, btn) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll("nav button").forEach(t => t.classList.remove("active"));
      document.getElementById("tab-"+id).classList.add("active"); btn.classList.add("active");
      const f = document.querySelector("#tab-"+id+" iframe"); if (f && !f.src) f.src = f.dataset.src;
    }

    const KPI = { connection_requests:"Connection Requests", messages_sent:"Messages Sent", inmails_sent:"InMails Sent", replies:"Replies", active:"Active", completed:"Completed" };
    j("api/kpis/").then(d => { document.getElementById("kpis").innerHTML = Object.entries(KPI).map(([k,l]) => `<div class="kpi"><div class="label">${l}</div><div class="value">${d[k]??0}</div></div>`).join(""); });
    j("api/senders/").then(d => { const c=(u,k)=>u[k]?`${u[k].used}/${u[k].cap}`:"—";
      document.querySelector("#senders tbody").innerHTML = d.senders.map(s=>`<tr><td>${s.username}</td><td>${s.active?"yes":"no"}</td><td>${s.has_inmail?"yes":"no"}</td><td>${c(s.usage,"connect")}</td><td>${c(s.usage,"message")}</td></tr>`).join("") || `<tr><td colspan="5">No senders — add one in Accounts.</td></tr>`; });

    // ---------- Flow builder ----------
    const STEP_TYPES = [["connect","Send Connection Request"],["message","Send Message"],["inmail","Send InMail"],["wait","Wait"],["profile_visit","View Profile"],["like_post","Like Post"]];
    const FIELDS = { connect:[["personalised_note","Connection note","textarea"],["wait_days_before_branch_decision","Days to wait for acceptance","number"]], message:[["template","Message","textarea"]], inmail:[["subject","Subject","input"],["body","Body","textarea"]], wait:[["days","Wait days","number"]], profile_visit:[], like_post:[] };
    function branchOpts(t){ if(t==="connect")return[["success","if accepted","yes"],["failure","if NOT accepted","no"]]; if(t==="message")return[["success","if replied","yes"],["failure","if no reply","no"]]; return[["success","then (next step)","yes"]]; }
    let CUR = null;

    function typePicker(parentId, branch){
      const id = "p_"+(parentId||"root")+"_"+branch;
      const opts = STEP_TYPES.map(([v,l])=>`<option value="${v}">${l}</option>`).join("");
      return `<span class="picker" id="${id}" style="display:none"><select>${opts}</select> <button onclick="addStep(${parentId},'${branch}','${id}')">Add</button></span>`;
    }
    function addControls(n){
      let h = "";
      for (const [branch,label,cls] of branchOpts(n.step_type)){
        const has = branch==="success" ? n.success.length : n.failure.length;
        if (has) continue;
        const pid = "p_"+n.id+"_"+branch;
        h += `<button class="addbtn ${cls}" onclick="togglePicker('${pid}')">+ ${label}</button>${typePicker(n.id, branch)}`;
      }
      return h;
    }
    function editor(n){
      const fs = FIELDS[n.step_type]||[]; if(!fs.length) return "";
      const inputs = fs.map(([k,l,t])=>{ const v=(n.config&&n.config[k]!=null)?n.config[k]:"";
        const el = t==="textarea" ? `<textarea rows="3" data-k="${k}">${String(v).replace(/</g,"&lt;")}</textarea>` : `<input type="${t==="number"?"number":"text"}" data-k="${k}" value="${String(v).replace(/"/g,"&quot;")}">`;
        return `<label>${l}</label>${el}`; }).join("");
      return `<div class="editor" data-step="${n.id}" style="display:none">${inputs}<button onclick="saveStep(${n.id})">Save</button></div>`;
    }
    function renderNode(n){
      let h = `<div><span class="node"><b>${n.step_type.replace("_"," ")}</b><span class="ed" onclick="toggleEd(${n.id})">edit</span></span>${editor(n)}<div>${addControls(n)}</div></div>`;
      if (n.success.length) h += `<div class="branch yes"><div class="blabel">✓ IF YES (accepted / replied)</div>${n.success.map(renderNode).join("")}</div>`;
      if (n.failure.length) h += `<div class="branch no"><div class="blabel">✗ IF NO (not accepted / no reply)</div>${n.failure.map(renderNode).join("")}</div>`;
      return h;
    }
    window.togglePicker = id => { const e=document.getElementById(id); e.style.display = e.style.display==="none"?"inline-block":"none"; };
    window.toggleEd = id => { const e=document.querySelector(`.editor[data-step="${id}"]`); if(e) e.style.display = e.style.display==="none"?"block":"none"; };
    window.addStep = (parentId, branch, pickerId) => {
      const sel = document.querySelector(`#${pickerId} select`);
      j(`api/sequence/${CUR}/step/`, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({parent_id: parentId, branch, step_type: sel.value})})
        .then(r => r.id ? loadSeq(CUR) : alert(r.error||"add failed"));
    };
    window.saveStep = id => {
      const ed = document.querySelector(`.editor[data-step="${id}"]`); const cfg={};
      ed.querySelectorAll("[data-k]").forEach(el => { let v=el.value; if(el.type==="number") v = v===""?0:Number(v); cfg[el.dataset.k]=v; });
      j(`api/step/${id}/`, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({config: cfg})}).then(r => r.ok ? loadSeq(CUR) : alert(r.error||"save failed"));
    };
    window.createSeq = () => {
      const name = document.getElementById("newseqname").value || "New sequence";
      j("api/sequences/create/", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({name})}).then(r => refreshSeqs(r.id));
    };
    function loadSeq(id){
      CUR = id;
      if(!id){ document.getElementById("flow").textContent = "Pick or create a sequence…"; return; }
      j(`api/sequence/${id}/`).then(seq => {
        document.getElementById("flow").innerHTML = seq.root
          ? renderNode(seq.root)
          : `<p class="hint">Empty — add the first step (usually a connection request):</p><button class="addbtn yes" onclick="togglePicker('p_root_root')">+ Add first step</button>${typePicker(null,'root')}`;
      });
    }
    function refreshSeqs(selectId){
      return j("api/sequences/").then(d => {
        const sel = document.getElementById("seqpick");
        sel.innerHTML = `<option value="">—</option>` + d.sequences.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");
        sel.onchange = () => loadSeq(sel.value);
        const pick = selectId || (d.sequences[0] && d.sequences[0].id);
        if (pick) { sel.value = pick; loadSeq(pick); }
      });
    }
    refreshSeqs();
  </script>
</body>
</html>
